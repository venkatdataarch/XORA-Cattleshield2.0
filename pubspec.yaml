name: cattleshield
description: XORA CattleShield 2.0 - Digital Livestock Insurance Platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.4

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Auth / Storage
  flutter_secure_storage: ^9.2.3
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # PDF
  pdf: ^3.11.2
  printing: ^5.13.4

  # Image Processing
  image: ^4.3.0

  # Location
  geolocator: ^13.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  connectivity_plus: ^6.1.1

  # ML Kit for auto-capture
  google_mlkit_object_detection: ^0.13.0

  # Crypto for SHA-256 hashing
  crypto: ^3.0.6
  camerawesome: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/schemas/
    - assets/images/
